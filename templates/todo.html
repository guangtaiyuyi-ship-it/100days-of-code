<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Todoアプリ (ORM版)</title>
</head>
<body>
    <h1>Todoアプリ (ORM版)</h1>

    <form action="/" method="POST">
        <input type="text" name="task_content" placeholder="新しいタスクを入力" required>
        <button type="submit">追加</button>
    </form>

    <h2>タスク一覧</h2>
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.content }}
                
                <a href="/edit/{{ task.id }}" style="margin-left: 10px; margin-right: 10px;">[編集する]</a>

                <form action="/delete/{{ task.id }}" method="POST" style="display:inline;">
                    <button type="submit">削除</button>
                </form>
            </li>
        {% else %}
            <li>タスクはありません。</li>
        {% endfor %}
    </ul>
</body>
</html>
