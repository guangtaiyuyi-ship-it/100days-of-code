<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モダンTodoアプリ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>マイ Todo リスト</h1>

        <form action="/" method="POST" class="input-form">
            <input type="text" name="task_content" placeholder="新しいタスクを入力" required>
            <button type="submit" class="btn-add">追加</button>
        </form>

        <ul>
        {% for task in tasks %}
            <li>
                <span class="task-text {% if task.is_completed %}completed{% endif %}">
                    {{ task.content }}
                </span>
                
                <form action="/toggle/{{ task.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn-toggle">
                        {% if task.is_completed %}戻す{% else %}完了{% endif %}
                    </button>
                </form>

                <a href="/edit/{{ task.id }}" class="btn-edit">編集</a>

                <form action="/delete/{{ task.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn-delete">削除</button>
                </form>
            </li>
            {% else %}
                <li style="color: #95a5a6;">タスクはありません。</li>
            {% endfor %}
        </ul>
        <div style="margin-top: 20px; text-align: right;">
            <form action="/delete_completed" method="POST">
                <button type="submit" class="btn-clear" 
                        {% if tasks|selectattr('is_completed', 'equalto', true)|list|length == 0 %}disabled{% endif %}>
                    完了済みタスクを全て削除
                </button>
            </form>
        </div>
    </div> ```
</body>
</html>
