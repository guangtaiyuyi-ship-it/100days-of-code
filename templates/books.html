<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書籍リスト</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight: bold; color: #7f8c8d;">こんにちは、{{ username }} さん</span>
        <a href="{{ url_for('logout') }}" style="color: #e74c3c; text-decoration: none; font-size: 14px; font-weight: bold;">[ログアウト]</a>
    </div>
    <h1>書籍リスト</h1>
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('add_book') }}" class="btn-add" style="width: 100%; padding: 10px;">新しい書籍を追加</a>
    </div>
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr>
                <th style="padding: 10px;">書籍名</th>
                <th style="padding: 10px;">著者</th>
                <th style="padding: 10px;">状態</th>
                <th style="padding: 10px;">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr style="border-bottom: 1px solid #f1f1f1;">
                <td style="padding: 10px;">{{ book.title }}</td>
                <td style="padding: 10px;">{{ book.author }}</td>
            <td style="padding: 10px;">
                <span class="book-status {% if book.is_completed %}completed{% endif %}" style="padding: 10px;">
                    {% if book.is_completed %}読了{% else %}未読{% endif %}
                </span>
            </td>
            <td style="padding: 10px; text-align: center;">
                    <div style="display: flex; gap: 5px; justify-content: center;">
                        <form action="{{ url_for('toggle_books', book_id=book.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn-toggle">
                                {% if book.is_completed %}戻す{% else %}完了{% endif %}
                            </button>
                        </form>
                    <a href="{{ url_for('edit_books', book_id=book.id) }}" class="btn-edit">編集</a>
                    <form action="{{ url_for('delete_book', book_id=book.id) }}" method="POST">
                        <button type="submit" class="btn-delete">削除</button>
                    </form> 
                </div>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="4" style="padding: 20px; text-align: center; color: #95a5a6;">書籍がありません。</td>
        </tr>
        {% endfor %}
    </tbody>
    <div style="margin-top: 20px; text-align: right;">
            <form action="{{ url_for('delete_completed_books') }}" method="POST">
                <button type="submit" class="btn-clear" 
                        {% if books|selectattr('is_completed', 'equalto', true)|list|length == 0 %}disabled{% endif %}>
                    完了済み書籍を全て削除
                </button>
            </form>
        </div>
    </div> ```
</body>
</html>
