{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
    <div class="container">
        <h1>ログイン</h1>
        <form action="/login" method="POST" class="input-form" style="flex-direction: column;">
            <input type="text" name="username" placeholder="ユーザー名" required style="margin-bottom: 10px;">
            <input type="password" name="password" placeholder="パスワード" required style="margin-bottom: 15px; padding: 10px; border: 1px solid #cfd8dc; border-radius: 6px; font-size: 16px;">
            <button type="submit" class="btn-add" style="width: 100%;">ログイン</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">
            アカウントがない方は <a href="/signup" style="color: #3498db; text-decoration: none; font-weight: bold;">新規登録</a>
        </p>
    </div>
{% endblock %}
